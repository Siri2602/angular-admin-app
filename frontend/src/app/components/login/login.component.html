<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">🛡️</div>
      <h1>Welcome Back</h1>
      <p>Sign in to access the admin panel</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="userId">User ID</label>
        <input
          id="userId"
          type="text"
          formControlName="userId"
          placeholder="Enter your User ID"
          [class.error]="loginForm.get('userId')?.invalid && loginForm.get('userId')?.touched"
        />
        <span class="field-error" *ngIf="loginForm.get('userId')?.invalid && loginForm.get('userId')?.touched">
          User ID is required (min 3 characters)
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <span class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required (min 3 characters)
        </span>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" formControlName="role">
          <option value="General User">General User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        ❌ {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">🔐 Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="demo-credentials">
      <h4>Demo Credentials</h4>
      <div class="cred-row">
        <span class="cred-badge admin">Admin</span>
        <code>admin / admin123</code>
      </div>
      <div class="cred-row">
        <span class="cred-badge user">User</span>
        <code>john / john123</code>
      </div>
      <div class="cred-row">
        <span class="cred-badge user">User</span>
        <code>jane / jane123</code>
      </div>
    </div>
  </div>
</div>
